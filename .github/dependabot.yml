# Dependabot opens PRs to keep dependencies and GitHub Actions current.
# Monthly cadence keeps it quiet; security fixes still arrive as needed.
# Each PR runs through CI, so you see if a bump breaks anything before merging.
version: 2
updates:
  # Python dependencies (read from pyproject.toml).
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"

  # Versions of the actions used in .github/workflows/*.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci"
