name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    name: test (py${{ matrix.python-version }}, base)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install base only (proves the light path needs just plotext)
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest
      - run: pytest -q

  test-full:
    name: test (py3.12, full extras)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install with all extras (covers tensorboard + matplotlib paths)
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[full]'
          pip install pytest
      - run: pytest -q

  build:
    name: build + metadata check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist + wheel and validate metadata
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          twine check dist/*
