name: Publish to PyPI

# Publishes to PyPI whenever you publish a GitHub Release.
# Uses PyPI Trusted Publishing (OIDC) — no API token or secret required.
# One-time PyPI setup: Your account -> Publishing -> add a (pending) publisher
#   Project: terminalboard | Owner: dongfangyixi | Repo: terminalboard
#   Workflow: publish.yml   | Environment: pypi

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi          # must match the PyPI trusted-publisher config
    permissions:
      id-token: write          # required for OIDC trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
